---
layout: page
---

<h1>{{ page.title }}</h1>

<ul>
    {% for post in site.posts %}
    {% if post.tags contains page.tag %}
    <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span style="opacity: .6;">({{ post.date | date: "%Y-%m-%d" }})</span>
    </li>
    {% endif %}
    {% endfor %}
</ul>
