---
layout: page
---

<h1>{{ page.title }}</h1>

<ul>
    {% assign t = page.tag | downcase %}
    {% for post in site.posts %}
    {% if post.tags contains page.tag or post.tags contains t %}
    <li>
        <a href="{{ post.url | relative_url }}">{{ post.title }}</a>
        <span> – {{ post.date | date: "%d.%m.%Y" }}</span>
    </li>
    {% endif %}
    {% endfor %}
</ul>
